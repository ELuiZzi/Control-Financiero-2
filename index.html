<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="description" content="Control de Finanzas Personales Offline">
    
    <!-- PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/272/272525.png">

    <title>Finance Flow</title>
    
    <!-- Librerías Externas (Tailwind, React, Babel) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { 50:'#f0f9ff', 100:'#e0f2fe', 500:'#0ea5e9', 600:'#0284c7', 700:'#0369a1' }
            }
          }
        }
      }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      body { -webkit-tap-highlight-color: transparent; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/"
  }
}
</script>
</head>
<body class="bg-gray-100 text-gray-900 antialiased select-none">
    <div id="root"></div>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.log('SW falló:', err));
        });
      }
    </script>

    <!-- Main Application Logic -->
    <script type="text/babel">
        // --- ICONS ---
        const IconWallet = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1" /><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4" /></svg>;
        const IconTrendingUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></svg>;
        const IconPiggyBank = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 5c-1.5 0-2.8 1.4-3 2-3.5-1.5-11-.3-11 5 0 1.8 0 3 2 4.5V20h4v-2h3v2h4v-4c1-.5 1.7-1 2-2.5V5z" /><path d="M2 9v1c0 1.1.9 2 2 2h1" /><path d="M16 11h.01" /></svg>;
        const IconUser = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>;
        const IconHistory = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /><path d="M12 7v5l4 2" /></svg>;
        const IconDownload = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" x2="12" y1="15" y2="3" /></svg>;
        const IconUpload = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" x2="12" y1="3" y2="15" /></svg>;
        const IconSave = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></svg>;
        const IconTrash = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /></svg>;
        const IconRefresh = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /></svg>;
        const IconChart = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>;

        // --- CONSTANTS ---
        const STORAGE_KEY = "finance_state_v2";
        const SNAPSHOT_KEY = "finance_snapshots_v2";
        const INITIAL_STATE = {
          ahorro: 3092.97,
          personales: 873.12,
          inversion: 948.19,
          autoSplit: true,
          history: []
        };
        const MONTHS = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio','Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        // --- COMPONENTS ---

        const BalanceCard = ({ title, amount, icon, colorClass, percentage }) => {
          const formatted = amount.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          return (
            <div className={`rounded-2xl p-4 text-white shadow-lg ${colorClass} relative overflow-hidden transition-transform transform active:scale-95`}>
                <div className="absolute right-[-10px] top-[-10px] opacity-20 transform scale-150 rotate-12">{icon}</div>
                <div className="relative z-10 flex flex-col h-full justify-between">
                    <div className="flex items-center space-x-2 mb-2 opacity-90">
                        <div className="p-1.5 bg-white/20 rounded-lg backdrop-blur-sm">
                            {React.cloneElement(icon, { className: 'w-4 h-4 text-white' })}
                        </div>
                        <span className="text-sm font-medium tracking-wide">{title}</span>
                    </div>
                    <div>
                        <span className="text-2xl font-bold tracking-tight">${formatted}</span>
                        {percentage && <span className="text-xs ml-2 opacity-80 font-mono">({percentage}%)</span>}
                    </div>
                </div>
            </div>
          );
        };

        const MonthlyStats = ({ history }) => {
            const [selectedMonth, setSelectedMonth] = React.useState(new Date().getMonth());
            const [selectedYear, setSelectedYear] = React.useState(new Date().getFullYear());

            const availableYears = React.useMemo(() => {
                const years = new Set();
                years.add(new Date().getFullYear());
                history.forEach(t => years.add(new Date(t.date).getFullYear()));
                return Array.from(years).sort((a, b) => b - a);
            }, [history]);

            const stats = React.useMemo(() => {
                let income = 0;
                let expense = 0;
                history.forEach(t => {
                const d = new Date(t.date);
                if (d.getMonth() === selectedMonth && d.getFullYear() === selectedYear) {
                    if (t.type === 'ingreso') income += t.value;
                    else expense += t.value;
                }
                });
                return { income, expense, balance: income - expense };
            }, [history, selectedMonth, selectedYear]);

            const formatMoney = (val) => val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            return (
                <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 mb-6">
                <div className="flex items-center justify-between mb-4">
                    <h3 className="text-sm font-bold text-gray-900 flex items-center gap-2">
                    <IconChart className="w-4 h-4 text-brand-600" /> Resumen Mensual
                    </h3>
                    <div className="flex gap-2">
                        <select value={selectedMonth} onChange={(e) => setSelectedMonth(Number(e.target.value))} className="bg-gray-50 border border-gray-200 text-gray-700 text-xs rounded-lg p-1.5 outline-none focus:border-brand-500">
                            {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                        </select>
                        <select value={selectedYear} onChange={(e) => setSelectedYear(Number(e.target.value))} className="bg-gray-50 border border-gray-200 text-gray-700 text-xs rounded-lg p-1.5 outline-none focus:border-brand-500">
                            {availableYears.map(y => <option key={y} value={y}>{y}</option>)}
                        </select>
                    </div>
                </div>
                <div className="grid grid-cols-3 gap-2 text-center divide-x divide-gray-100">
                    <div>
                        <div className="text-[10px] text-gray-400 uppercase tracking-wider font-semibold mb-1">Ingresos</div>
                        <div className="text-sm font-bold text-emerald-600 truncate">+${formatMoney(stats.income)}</div>
                    </div>
                    <div>
                        <div className="text-[10px] text-gray-400 uppercase tracking-wider font-semibold mb-1">Gastos</div>
                        <div className="text-sm font-bold text-red-500 truncate">-${formatMoney(stats.expense)}</div>
                    </div>
                    <div>
                        <div className="text-[10px] text-gray-400 uppercase tracking-wider font-semibold mb-1">Neto</div>
                        <div className={`text-sm font-bold truncate ${stats.balance >= 0 ? 'text-gray-900' : 'text-red-600'}`}>
                            {stats.balance >= 0 ? '$' : '-$'}{formatMoney(Math.abs(stats.balance))}
                        </div>
                    </div>
                </div>
                </div>
            );
        };

        const TransactionForm = ({ onAdd, autoSplit, onToggleAutoSplit }) => {
          const [amount, setAmount] = React.useState('');
          const [type, setType] = React.useState('ingreso');
          const [target, setTarget] = React.useState('auto');
          const [description, setDescription] = React.useState('');

          const handleSubmit = (e) => {
            e.preventDefault();
            const raw = parseFloat(amount.replace(/[^0-9.-]+/g, ""));
            if (!isFinite(raw) || raw === 0) return;
            onAdd(raw, type, target, description);
            setAmount('');
            setDescription('');
            if(type === 'ingreso') setTarget('auto');
          };

          const handleTypeChange = (newType) => {
            setType(newType);
            if (newType === 'gasto' && target === 'auto') setTarget('personales');
            else if (newType === 'ingreso') setTarget('auto');
          };

          return (
            <form onSubmit={handleSubmit} className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
              <div className="flex bg-gray-100 rounded-xl p-1 mb-4">
                <button type="button" onClick={() => handleTypeChange('ingreso')} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${type === 'ingreso' ? 'bg-white text-emerald-600 shadow-sm' : 'text-gray-500'}`}>Ingreso (+)</button>
                <button type="button" onClick={() => handleTypeChange('gasto')} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${type === 'gasto' ? 'bg-white text-red-600 shadow-sm' : 'text-gray-500'}`}>Gasto (-)</button>
              </div>
              <div className="mb-4 relative">
                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-lg">$</span>
                <input type="text" inputMode="decimal" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0.00" className="w-full bg-gray-50 border border-gray-200 text-gray-900 text-3xl font-bold rounded-2xl py-4 pl-10 pr-4 focus:ring-2 focus:ring-brand-500 outline-none" />
              </div>
              {type === 'gasto' && (
                  <div className="mb-4 animate-in fade-in slide-in-from-top-2">
                    <input type="text" value={description} onChange={(e) => setDescription(e.target.value)} placeholder="Descripción (ej. Supermercado)" className="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-xl py-3 px-4 focus:ring-2 focus:ring-brand-500 outline-none" />
                  </div>
              )}
              <div className="mb-6">
                <label className="block text-xs font-medium text-gray-500 mb-2 uppercase tracking-wider ml-1">Destino / Origen</label>
                <div className="grid grid-cols-2 gap-2">
                    {type === 'ingreso' && <button type="button" onClick={() => setTarget('auto')} className={`py-2 px-3 rounded-xl text-xs font-medium border ${target === 'auto' ? 'bg-brand-50 border-brand-500 text-brand-700' : 'bg-white border-gray-200 text-gray-600'}`}>Auto Split</button>}
                    <button type="button" onClick={() => setTarget('ahorro')} className={`py-2 px-3 rounded-xl text-xs font-medium border ${target === 'ahorro' ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'bg-white border-gray-200 text-gray-600'}`}>Ahorro</button>
                    <button type="button" onClick={() => setTarget('personales')} className={`py-2 px-3 rounded-xl text-xs font-medium border ${target === 'personales' ? 'bg-slate-50 border-slate-500 text-slate-700' : 'bg-white border-gray-200 text-gray-600'}`}>Personales</button>
                    <button type="button" onClick={() => setTarget('inversion')} className={`py-2 px-3 rounded-xl text-xs font-medium border ${target === 'inversion' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white border-gray-200 text-gray-600'}`}>Inversión</button>
                </div>
              </div>
              <button type="submit" disabled={!amount} className="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-black disabled:opacity-50">
                {type === 'ingreso' ? 'Registrar Ingreso' : 'Registrar Gasto'}
              </button>
              <div className="mt-4 flex items-center justify-center">
                 <label className="flex items-center space-x-2 cursor-pointer p-2">
                    <input type="checkbox" checked={autoSplit} onChange={(e) => onToggleAutoSplit(e.target.checked)} className="accent-brand-600 w-4 h-4" />
                    <span className="text-xs text-gray-500">Mantener "Auto Split" activo</span>
                 </label>
              </div>
            </form>
          );
        };

        const HistoryList = ({ history }) => {
          if (history.length === 0) return <div className="bg-white rounded-3xl p-8 text-center border border-gray-100 mt-6"><IconTrendingUp className="text-gray-300 w-8 h-8 mx-auto mb-2" /><p className="text-gray-400 text-sm">Sin movimientos recientes</p></div>;
          return (
            <div className="mt-6">
              <h3 className="text-lg font-bold text-gray-900 mb-4 px-2">Historial Reciente</h3>
              <div className="space-y-3">
                {history.map((t) => (
                  <div key={t.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                    <div>
                        <div className="flex items-center gap-2">
                            <span className={`text-sm font-bold ${t.type === 'ingreso' ? 'text-emerald-600' : 'text-red-600'}`}>{t.type === 'ingreso' ? 'Ingreso' : 'Gasto'}</span>
                            <span className="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full capitalize">{t.target === 'auto' ? 'Split Auto' : t.target}</span>
                        </div>
                        {t.description && <div className="text-gray-800 text-sm mt-0.5 font-medium">{t.description}</div>}
                        <div className="text-xs text-gray-400 mt-1">{new Date(t.date).toLocaleString()}</div>
                    </div>
                    <div className={`text-lg font-bold ${t.type === 'ingreso' ? 'text-emerald-600' : 'text-gray-900'}`}>
                        {t.type === 'ingreso' ? '+' : '-'}${t.value.toLocaleString(undefined, { minimumFractionDigits: 2 })}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const DataManagement = ({ state, snapshots, onSaveSnapshot, onImportSnapshot, onDeleteSnapshot, onImportFile, onReset }) => {
          const [isOpen, setIsOpen] = React.useState(false);
          const [snapName, setSnapName] = React.useState('');

          const handleExport = () => {
            const date = new Date();
            const fileName = `finanzas_backup_${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}.json`;
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
          };

          return (
            <div className="mt-8 mb-12">
              <button onClick={() => setIsOpen(!isOpen)} className="w-full flex items-center justify-center space-x-2 py-3 text-gray-500 hover:text-gray-800 transition-colors">
                <span className="text-sm font-medium">Gestión de Archivos y Copias</span>
                <IconRefresh className={`w-4 h-4 transform transition-transform ${isOpen ? 'rotate-180' : ''}`} />
              </button>
              {isOpen && (
                <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 mt-2 space-y-6">
                  <section>
                    <h4 className="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2"><IconDownload className="w-4 h-4" /> Respaldo en Dispositivo</h4>
                    <p className="text-xs text-gray-500 mb-3">Guarda una copia física en tu carpeta de Descargas.</p>
                    <div className="flex flex-col gap-3">
                        <button onClick={handleExport} className="flex items-center justify-center gap-2 p-4 bg-gray-900 text-white rounded-xl shadow-lg hover:bg-black active:scale-[0.98]">
                            <IconDownload className="w-5 h-5 text-white" /><span className="text-sm font-bold">Guardar Copia en Archivos</span>
                        </button>
                        <label className="flex items-center justify-center gap-2 p-3 bg-white border border-gray-200 rounded-xl cursor-pointer text-gray-700">
                            <IconUpload className="w-5 h-5" /><span className="text-sm font-medium">Restaurar desde Archivo</span>
                            <input type="file" accept="application/json" onChange={e => e.target.files && onImportFile(e.target.files[0])} className="hidden" />
                        </label>
                    </div>
                  </section>
                  <hr className="border-gray-100" />
                  <section>
                    <h4 className="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2"><IconHistory className="w-4 h-4" /> Puntos de Restauración</h4>
                    <div className="flex gap-2 mb-4">
                        <input type="text" value={snapName} onChange={e => setSnapName(e.target.value)} placeholder="Nombre (ej. Antes de vacaciones)" className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none" />
                        <button onClick={() => {if(snapName){ onSaveSnapshot(snapName); setSnapName(''); }}} disabled={!snapName} className="bg-brand-600 text-white p-2.5 rounded-xl disabled:opacity-50"><IconSave className="w-5 h-5" /></button>
                    </div>
                    <div className="space-y-2 max-h-48 overflow-y-auto no-scrollbar">
                        {snapshots.map(snap => (
                            <div key={snap.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100">
                                <div className="flex-1"><div className="text-sm font-medium text-gray-800">{snap.name}</div><div className="text-xs text-gray-500">{new Date(snap.date).toLocaleDateString()}</div></div>
                                <div className="flex gap-1">
                                    <button onClick={() => {if(confirm(`¿Restaurar saldo a '${snap.name}'?`)) onImportSnapshot(snap);}} className="p-2 text-blue-600 rounded-lg"><IconUpload className="w-4 h-4" /></button>
                                    <button onClick={() => onDeleteSnapshot(snap.id)} className="p-2 text-red-400 rounded-lg"><IconTrash className="w-4 h-4" /></button>
                                </div>
                            </div>
                        ))}
                    </div>
                  </section>
                  <section className="pt-4 border-t border-gray-100">
                      <button onClick={() => { if(confirm("¿Reiniciar de fábrica?")) onReset() }} className="w-full py-3 rounded-xl text-red-500 text-xs font-medium bg-red-50">Reiniciar Todo</button>
                  </section>
                </div>
              )}
            </div>
          );
        };

        // --- MAIN APP ---
        function App() {
          const [state, setState] = React.useState(() => {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || INITIAL_STATE; } 
            catch { return INITIAL_STATE; }
          });

          const [snapshots, setSnapshots] = React.useState(() => {
            try { return JSON.parse(localStorage.getItem(SNAPSHOT_KEY)) || []; } 
            catch { return []; }
          });

          React.useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }, [state]);
          React.useEffect(() => { localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(snapshots)); }, [snapshots]);

          const handleAddTransaction = (amount, type, target, description) => {
            const value = Math.round(amount * 100) / 100;
            setState(prev => {
              let { ahorro, personales, inversion } = prev;
              if (type === 'ingreso') {
                if (prev.autoSplit && target === 'auto') {
                  ahorro += Math.round(value * 0.10 * 100) / 100;
                  personales += Math.round(value * 0.25 * 100) / 100;
                  inversion += Math.round(value * 0.65 * 100) / 100;
                } else {
                  if (target === 'ahorro') ahorro += value;
                  else if (target === 'personales') personales += value;
                  else if (target === 'inversion') inversion += value;
                  else { // fallback logic same as auto
                     ahorro += Math.round(value * 0.10 * 100) / 100;
                     personales += Math.round(value * 0.25 * 100) / 100;
                     inversion += Math.round(value * 0.65 * 100) / 100;
                  }
                }
              } else {
                if (target === 'ahorro') ahorro -= value;
                else if (target === 'personales') personales -= value;
                else if (target === 'inversion') inversion -= value;
                else personales -= value;
              }
              const newTransaction = {
                id: crypto.randomUUID(),
                date: new Date().toISOString(),
                type, value, target,
                description: description.trim() || undefined,
                balancesSnapshot: { ahorro, personales, inversion }
              };
              return { ...prev, ahorro, personales, inversion, history: [newTransaction, ...prev.history].slice(0, 200) };
            });
          };

          const total = state.ahorro + state.personales + state.inversion;

          const handleImportFile = (file) => {
            const reader = new FileReader();
            reader.onload = e => {
              try {
                const parsed = JSON.parse(e.target.result);
                if (parsed && typeof parsed === "object" && 'ahorro' in parsed) {
                  if (confirm("¿Reemplazar los saldos actuales con los datos importados?")) setState(parsed);
                } else alert("Archivo inválido");
              } catch (err) { alert("Error: " + err.message); }
            };
            reader.readAsText(file);
          };

          return (
            <div className="min-h-screen pb-10 max-w-md mx-auto px-4 py-8">
                <header className="mb-8 text-center">
                    <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight">Finance Flow</h1>
                    <p className="text-gray-500 text-sm mt-1">Control de Finanzas Offline</p>
                </header>

                <div className="mb-6 text-center bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
                    <span className="text-xs font-semibold text-gray-400 uppercase tracking-widest">Patrimonio Total</span>
                    <div className="text-4xl font-black text-gray-900 mt-1">${total.toLocaleString(undefined, { minimumFractionDigits: 2 })}</div>
                </div>

                <div className="grid grid-cols-1 gap-4 mb-8">
                    <BalanceCard title="Ahorro / Emergencias" amount={state.ahorro} icon={<IconPiggyBank />} colorClass="bg-gradient-to-br from-emerald-500 to-emerald-700" percentage={total > 0 ? Math.round((state.ahorro / total) * 100) : 0} />
                    <BalanceCard title="Gastos Personales" amount={state.personales} icon={<IconUser />} colorClass="bg-gradient-to-br from-slate-500 to-slate-700" percentage={total > 0 ? Math.round((state.personales / total) * 100) : 0} />
                    <BalanceCard title="Inversión" amount={state.inversion} icon={<IconTrendingUp />} colorClass="bg-gradient-to-br from-indigo-500 to-indigo-700" percentage={total > 0 ? Math.round((state.inversion / total) * 100) : 0} />
                </div>

                <TransactionForm onAdd={handleAddTransaction} autoSplit={state.autoSplit} onToggleAutoSplit={(val) => setState(s => ({...s, autoSplit: val}))} />
                
                <div className="mt-6"><MonthlyStats history={state.history} /></div>

                <HistoryList history={state.history} />

                <DataManagement 
                    state={state} 
                    snapshots={snapshots}
                    onSaveSnapshot={(name) => setSnapshots(p => [{id: crypto.randomUUID(), name, date: new Date().toISOString(), state: JSON.parse(JSON.stringify(state))}, ...p].slice(0,50))}
                    onImportSnapshot={(snap) => setState(snap.state)}
                    onDeleteSnapshot={(id) => setSnapshots(p => p.filter(s => s.id !== id))}
                    onImportFile={handleImportFile}
                    onReset={() => setState(INITIAL_STATE)}
                />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
